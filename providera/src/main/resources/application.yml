server:
  port: 8081
spring:
  application:
    name: provider-a
  # 禁用数据源自动配置，改由 DataSourceConfig 按开关手动创建，避免无 MySQL 时启动卡顿
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.sql.init.SqlInitializationAutoConfiguration
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}  # 通过环境变量注入
        namespace: ${NACOS_NAMESPACE:public}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}  # 通过环境变量注入
        namespace: ${NACOS_NAMESPACE:public}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        refresh-enabled: true  # 启用配置动态刷新
        file-extension: yml
  config:
    import: "optional:nacos:provider-a.yml"  # 显式导入 Nacos 配置
management:
  endpoints:
    web:
      exposure:
        include: refresh,health,info  # 暴露的端点，refresh 用于配置刷新
  endpoint:
    health:
      show-details: always  # 显示健康检查的详细信息

# 中间件开关与连接配置（默认关闭，ENABLE_MYSQL=true 时启用 MySQL）
app:
  middleware:
    mysql:
      enabled: ${ENABLE_MYSQL:false}
      host: ${MYSQL_HOST:localhost}
      port: ${MYSQL_PORT:3306}
      database: ${MYSQL_DATABASE:provider_a_db}
      username: ${MYSQL_USER:root}
      password: ${MYSQL_PASSWORD:root}
